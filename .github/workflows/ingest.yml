name: Ingest Polymarket Pulse

concurrency:
  group: ingest-polymarket
  cancel-in-progress: true

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ingest/requirements.txt

      - name: Run ingest
        env:
          PG_CONN: ${{ secrets.PG_CONN }}
        run: |
          python ingest/main.py
